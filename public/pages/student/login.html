<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kool Click | Student Login</title>
    <link rel="stylesheet" href="../../css/theme.css" />
  </head>
  <body>
    <main class="kc-shell">
      <header id="kcHeader">
        <div class="kc-brand">
          <img src="../../assets/temp/logo.png" alt="Kool Click" />
          <div class="kc-brand-text">
            <span class="kc-brand-title">Kool Click</span>
            <span class="kc-brand-slogan">Click. Order. Enjoy.</span>
          </div>
        </div>
      </header>

      <section class="kc-register-hero">
        <h1 class="kc-register-hero-title">Welcome Back, Student</h1>
        <p class="kc-register-hero-subtitle">
          Sign in to your Kool Click student dashboard.
        </p>
        <div class="kc-register-rules">
          <span class="kc-chip">Fast campus food ordering</span>
          <span class="kc-chip">Live order status updates</span>
          <span class="kc-chip">Points, levels, and discounts</span>
        </div>
      </section>

      <section class="kc-card kc-login-card">
        <h2 class="kc-title">Student Login</h2>
        <p class="kc-subtitle">Enter your university ID and password.</p>

        <form id="loginForm" class="kc-form kc-login-form">
          <div class="kc-login-field">
            <label for="universityId">University ID</label>
            <input id="universityId" name="universityId" type="text" maxlength="8" placeholder="2xxxxxxx" required />
          </div>

          <div class="kc-login-field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" minlength="6" required />
          </div>

          <div class="kc-register-actions">
            <input type="submit" value="Login" />
            <a class="kc-btn kc-btn-secondary" href="./register.html">Create Account</a>
          </div>
        </form>

        <p id="msg" class="kc-muted" aria-live="polite"></p>
      </section>
    </main>

    <script type="module" src="../../js/student-login.js"></script>
  </body>
</html>
