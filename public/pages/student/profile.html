<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kool Click | Student Profile</title>
    <link rel="stylesheet" href="../../css/theme.css" />
  </head>
  <body>
    <main class="kc-shell">
      <header id="kcHeader"></header>

      <section class="kc-card" style="margin-top: 1rem">
        <h1 class="kc-title">Profile</h1>
        <div id="studentMini"></div>
      </section>

      <section class="kc-card" style="margin-top: 1rem">
        <div class="kc-two">
          <div class="kc-item"><strong>Name:</strong> <span id="fullName"></span></div>
          <div class="kc-item"><strong>University ID:</strong> <span id="universityId"></span></div>
          <div class="kc-item"><strong>Phone:</strong> <span id="phone"></span></div>
          <div class="kc-item"><strong>Birth Date:</strong> <span id="birthDate"></span></div>
          <div class="kc-item"><strong>Points:</strong> <span id="points"></span></div>
          <div class="kc-item"><strong>Level:</strong> <span id="level"></span> | Discount: <span id="discount"></span></div>
        </div>
      </section>
    </main>

    <script type="module" src="../../js/student-profile.js"></script>
  </body>
</html>
