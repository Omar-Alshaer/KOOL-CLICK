<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kool Click | Clicker Login</title>
    <link rel="stylesheet" href="../../css/theme.css" />
  </head>
  <body>
    <main class="kc-shell">
      <header id="kcHeader" class="kc-login-header">
        <div class="kc-brand">
          <img src="../../assets/brand/logo_trans.svg" alt="Kool Click" />
          <div class="kc-brand-text">
            <span class="kc-brand-title">KOOL CLICK</span>
            <span class="kc-brand-slogan">Click. Order. Enjoy.</span>
          </div>
        </div>
      </header>

      <section class="kc-register-hero">
        <h1 class="kc-register-hero-title">Welcome Back, Clicker</h1>
        <p class="kc-register-hero-subtitle">
          Sign in to your Kool Click dashboard.
        </p>
        <div class="kc-register-rules">
          <span class="kc-chip">Fast food ordering</span>
          <span class="kc-chip">Live order status updates</span>
          <span class="kc-chip">Points, levels, and discounts</span>
        </div>
      </section>

      <section class="kc-card kc-login-card">
        <h2 class="kc-title">Clicker Login</h2>
        <p class="kc-subtitle">Use your username, phone number, or email.</p>

        <form id="loginForm" class="kc-form kc-login-form">
          <div class="kc-login-field">
            <label for="identifier">Username / Phone / Email</label>
            <input id="identifier" name="identifier" type="text" placeholder="username, 01XXXXXXXXX, or email" autocomplete="username" required />
          </div>

          <div class="kc-login-field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" minlength="6" required />
          </div>

          <div class="kc-register-actions">
            <input type="submit" value="Login" />
            <a class="kc-btn kc-btn-secondary" href="./register.html">Create Account</a>
          </div>
        </form>

        <a href="./forgot-password.html" class="kc-forgot-link">
          <span class="kc-forgot-icon">🔑</span>
          Forgot your password?
        </a>

        <p id="msg" class="kc-muted" aria-live="polite"></p>
      </section>
    </main>

    <script type="module" src="../../js/clicker-login.js"></script>
  </body>
</html>
